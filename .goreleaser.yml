version: 2
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    binary: servercore-billing-exporter

dockers:
  - image_templates:
      - "ghcr.io/teamfighter/servercore-billing-exporter:{{ .Tag }}"
      - "ghcr.io/teamfighter/servercore-billing-exporter:latest"
    dockerfile: Dockerfile.goreleaser

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
