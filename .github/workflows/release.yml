name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Determine version
        id: version
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          CLEAN_TAG="${RAW_TAG#v}"
          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "clean_tag=$CLEAN_TAG" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.raw_tag }}"
          # Extract the changelog section for this version
          CHANGELOG=$(sed -n "/## \[${VERSION#v}\]/,/## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release $VERSION"
          fi
          {
            echo 'notes<<EOF'
            echo "$CHANGELOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Update release notes
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.raw_tag }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ## 🐳 Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/servercore-billing-exporter:${{ steps.version.outputs.clean_tag }}
            ```

            ## 🚀 Quick Start

            ```bash
            docker run -d \
              -p 9876:9876 \
              -e TOKEN=your_servercore_api_token \
              ghcr.io/${{ github.repository_owner }}/servercore-billing-exporter:${{ steps.version.outputs.clean_tag }}
            ```

            See [README](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.raw_tag }}/README.md) for full documentation.
